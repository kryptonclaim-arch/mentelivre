<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mente Livre</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(-45deg,#4A6FA5,#6B8DD6,#8E54E9,#4776E6);
    background-size:400% 400%;
    animation: gradientBG 12s ease infinite;
    overflow:hidden;
    opacity:0;
    transition:opacity 0.8s ease;
}

body.fade-in{ opacity:1; }
body.fade-out{ opacity:0; }

@keyframes gradientBG{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

.container{
    text-align:center;
}

.baloes{
    position:relative;
    width:260px;
    height:200px;
    margin:auto;
    cursor:pointer;
}

.balao{
    position:absolute;
    width:170px;
    animation: flutuar 4s ease-in-out infinite;
    transition: transform 0.3s ease;
}

.balao:nth-child(1){
    left:0;
    top:20px;
}

.balao:nth-child(2){
    right:0;
    top:40px;
    animation-delay:2s;
}

@keyframes flutuar{
    0%{transform:translateY(0px);}
    50%{transform:translateY(-15px);}
    100%{transform:translateY(0px);}
}

.baloes:hover .balao{
    transform: scale(1.1);
}

.baloes:active .balao{
    transform: scale(0.95);
}

/* Pontinhos digitando */
.dots{
    position:absolute;
    font-size:30px;
    color:#4A6FA5;
    letter-spacing:5px;
    animation: blink 1.5s infinite;
}

.dot1{ left:55px; top:70px; }
.dot2{ right:55px; top:85px; }

@keyframes blink{
    0%{opacity:0.2;}
    50%{opacity:1;}
    100%{opacity:0.2;}
}

h1{
    color:white;
    margin-top:30px;
    font-size:28px;
}
</style>
</head>

<body>

<div class="container">
    
    <div class="baloes" onclick="entrar()">
        <img src="https://cdn-icons-png.flaticon.com/512/742/742751.png" class="balao">
        <img src="https://cdn-icons-png.flaticon.com/512/742/742751.png" class="balao">
        
        <!-- Pontinhos -->
        <div class="dots dot1">•••</div>
        <div class="dots dot2">•••</div>
    </div>

    <h1>🧠 Mente Livre</h1>

</div>

<audio id="clickSound">
  <source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" type="audio/mpeg">
</audio>

<script>
document.addEventListener("DOMContentLoaded", ()=>{
    document.body.classList.add("fade-in");
});

function entrar(){
    document.getElementById("clickSound").play();
    document.body.classList.add("fade-out");
    setTimeout(()=>{
        window.location.href = "mural.html";
    },800);
}
</script>

</body>
</html>
