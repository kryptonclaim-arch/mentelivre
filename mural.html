<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mural - Mente Livre</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background: linear-gradient(-45deg,#4A6FA5,#6B8DD6,#8E54E9,#4776E6);
    background-size:400% 400%;
    animation: gradientBG 12s ease infinite;
}

@keyframes gradientBG{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

.container{
    max-width:600px;
    margin:40px auto;
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#4A6FA5;
}

select, textarea{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border-radius:10px;
    border:1px solid #ddd;
}

textarea{
    height:100px;
}

button{
    width:100%;
    padding:14px;
    background:#4A6FA5;
    color:white;
    border:none;
    border-radius:12px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#3a5f94;
}

.post{
    background:#f4f6fb;
    padding:15px;
    margin-bottom:15px;
    border-radius:15px;
}

/* --------- DEVS --------- */

.devs{
    text-align:center;
    margin:40px 0 20px 0;
}

.dev-box{
    display:inline-block;
    padding:15px 25px;
    border-radius:15px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    color:white;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
    font-size:14px;
}

.dev-box h3{
    margin:5px 0;
    font-size:16px;
}

.dev-box p{
    margin:3px 0;
}

.tl{
    font-weight:bold;
    color:#ffe082;
}
</style>
</head>

<body>

<div class="container">

<h1>🧠 Mente Livre</h1>
<p style="text-align:center;">Desabafe. Respire. Cuide da sua mente.</p>

<h3>1️⃣ Como estou me sentindo hoje?</h3>
<select id="emocao">
    <option value="🙂 Feliz">🙂 Feliz</option>
    <option value="😔 Triste">😔 Triste</option>
    <option value="😰 Ansioso">😰 Ansioso</option>
    <option value="😡 Irritado">😡 Irritado</option>
    <option value="😴 Cansado">😴 Cansado</option>
</select>

<h3>2️⃣ Preciso conversar?</h3>
<select id="conversar">
    <option value="Sim">Sim</option>
    <option value="Não">Não</option>
    <option value="Talvez">Talvez</option>
</select>

<h3>💬 Quer desabafar?</h3>
<textarea id="mensagem" placeholder="Escreva aqui..."></textarea>

<button onclick="publicar()">Publicar Anonimamente</button>

<hr style="margin:30px 0;">

<h2>📢 Mural Anônimo</h2>
<div id="feed"></div>

</div>

<!-- DEVS -->
<footer class="devs">
    <div class="dev-box">
        <h3>💻 Dev</h3>
        <p>Cauã • Kayko • Yam • Victor</p>
        <p class="tl">TL: Daniele</p>
    </div>
</footer>

<!-- Voltar para index se atualizar -->
<script>
window.addEventListener("pageshow", function (event) {
    const nav = performance.getEntriesByType("navigation")[0];
    if (nav && nav.type === "reload") {
        window.location.href = "index.html";
    }
});
</script>

<!-- Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCECp6Dg4cvcIkftLdOAcZ4mmge_usIQ2E",
  authDomain: "mente-livre-site.firebaseapp.com",
  projectId: "mente-livre-site",
  storageBucket: "mente-livre-site.firebasestorage.app",
  messagingSenderId: "735530905526",
  appId: "1:735530905526:web:5bcc3825735eebf8fe5b17"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// função para salvar post
window.publicar = async function(){

    let emocao = document.getElementById("emocao").value;
    let conversar = document.getElementById("conversar").value;
    let mensagem = document.getElementById("mensagem").value;

    if(mensagem.trim() === ""){
        alert("Escreva uma mensagem");
        return;
    }

    await addDoc(collection(db,"posts"),{
        emocao,
        conversar,
        mensagem,
        data: new Date().toLocaleString()
    });

    document.getElementById("mensagem").value="";
    carregarPosts();
}

// função para carregar posts
async function carregarPosts(){

    let feed = document.getElementById("feed");
    feed.innerHTML="";

    const querySnapshot = await getDocs(collection(db,"posts"));

    querySnapshot.forEach((doc)=>{
        let post = doc.data();

        feed.innerHTML += `
        <div class="post">
            <strong>${post.emocao}</strong> | Precisa conversar: ${post.conversar}
            <p>${post.mensagem}</p>
            <small>${post.data}</small>
        </div>
        `;
    });
}

carregarPosts();

</script>

</body>
</html>
